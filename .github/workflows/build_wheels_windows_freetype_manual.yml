 name: Windows x86_64 with freetype
 
 on:
   workflow_dispatch:
 
 
 jobs:
   Build:
     runs-on: windows-2025
     strategy:
       fail-fast: false
       matrix:
         #python-version: ['3.9']
         #platform: [x86, x64]
         #with_contrib: [0, 1]
         #without_gui: [0, 1]
         #build_sdist: [0]
         python-version: ['3.9']
         platform: [x64]
         with_contrib: [1]
         without_gui: [0]
         build_sdist: [0]
     env:
       ACTIONS_ALLOW_UNSECURE_COMMANDS: true
       SDIST: ${{ matrix.build_sdist || 0 }}
       ENABLE_HEADLESS: ${{ matrix.without_gui }}
       ENABLE_CONTRIB: ${{ matrix.with_contrib }}
       OPENCV_TEST_DATA_PATH: ${{ github.workspace }}\opencv_extra\testdata
       DEPENDENCIES_DIR: ${{ github.workspace }}\deps
     steps:
     - name: Cleanup
       shell: bash
       run: |
         rm -rf ./* || true
         rm -rf ./.??* || true
       working-directory: ${{ github.workspace }}
     - name: Setup environment
       shell: bash
       run: |
         if [[ "${{ github.event_name }}" == "schedule" || "${{ github.event_name }}" == "workflow_dispatch" ]]; then
           echo "ENABLE_ROLLING=1" >> $GITHUB_ENV
         fi
     - name: Set up Python ${{ matrix.python-version }}
       uses: actions/setup-python@v4
       with:
         python-version: ${{ matrix.python-version }}
         architecture: ${{ matrix.platform }}
     - name: Setup MSBuild.exe
       uses: microsoft/setup-msbuild@v1.1
     - name: Setup NASM
       uses: ilammy/setup-nasm@v1
     - name: Setup CMake
       uses: jwlawson/actions-setup-cmake@v2
       with:
        cmake-version: 3.24.2
     
     - name: Create Deps Directory
       run: mkdir deps
    
     - name: Build Brotli from source
       run: |
        git clone -b v1.2.0 https://github.com/google/brotli.git
        cmake -G "Visual Studio 17 2022" `
              -A ${{ matrix.platform == 'x86' && 'Win32' || 'x64' }} `
              -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/deps `
              -B ${{ github.workspace }}/brotli/build `
              -S ${{ github.workspace }}/brotli
        cmake --build ${{ github.workspace }}/brotli/build --config Release --target install
        
     - name: Build Zlib from source
       run: |
        git clone -b v1.3.2 https://github.com/madler/zlib.git
        cmake -G "Visual Studio 17 2022" `
              -A ${{ matrix.platform == 'x86' && 'Win32' || 'x64' }} `
              -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/deps `
              -B ${{ github.workspace }}/zlib/build `
              -S ${{ github.workspace }}/zlib
        cmake --build ${{ github.workspace }}/zlib/build --config Release --target install
     
     - name: Build freetype from source
       run: |
        git clone -b VER-2-14-3 https://github.com/freetype/freetype.git
        cmake -G "Visual Studio 17 2022" `
              -A ${{ matrix.platform == 'x86' && 'Win32' || 'x64' }} `
              -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/deps `
              -DFT_REQUIRE_BROTLI=TRUE `
              -DFT_REQUIRE_ZLIB=TRUE `
              -DCMAKE_PREFIX_PATH=${{ github.workspace }}/deps `
              -B ${{ github.workspace }}/freetype/build `
              -S ${{ github.workspace }}/freetype
        cmake --build ${{ github.workspace }}/freetype/build --config Release --target install

     - name: Build harfbuzz from source
       run: |
        git clone -b 14.0.0 https://github.com/harfbuzz/harfbuzz.git
        cmake -G "Visual Studio 17 2022" `
              -A ${{ matrix.platform == 'x86' && 'Win32' || 'x64' }} `
              -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/deps `
              -DHB_HAVE_FREETYPE=TRUE `
              -DZLIB_INCLUDE_DIR=${{ github.workspace }}/deps/include `
              -DZLIB_LIBRARY_RELEASE=${{ github.workspace }}/deps/lib/zlib.lib `
              -DFREETYPE_INCLUDE_DIR_freetype2=${{ github.workspace }}/deps/include/freetype2 `
              -DFREETYPE_INCLUDE_DIR_ft2build=${{ github.workspace }}/deps/include/freetype2 `
              -DFREETYPE_LIBRARY_RELEASE=${{ github.workspace }}/deps/lib/freetype.lib `
              -DCMAKE_PREFIX_PATH=${{ github.workspace }}/deps `
              -B ${{ github.workspace }}/harfbuzz/build `
              -S ${{ github.workspace }}/harfbuzz
        cmake --build ${{ github.workspace }}/harfbuzz/build --config Release --target install

     - name: Checkout
       uses: actions/checkout@v4
       with:
         submodules: false
         fetch-depth: 0
     - name: Build a package
       # CMake 3.25 regression fix. See https://stackoverflow.com/questions/74162633/problem-compiling-from-source-opencv-with-mvsc2019-in-64-bit-version
       run: |
         python --version
         python -m pip install --upgrade pip
         python -m pip install --upgrade setuptools
         python -m pip install cmake==3.24.2
         python -m pip install toml && python -c "import toml; c = toml.load('pyproject.toml'); print('\n'.join(c['build-system']['requires']))" >> requirements.txt | python -m pip install -r requirements.txt
         set "CI_BUILD=1" && python setup.py bdist_wheel --py-limited-api=cp37 --dist-dir=%cd%\wheelhouse -v
       shell: cmd
     - name: Saving all wheels
       uses: actions/upload-artifact@v4
       with:
         name: wheel-${{ matrix.with_contrib }}-${{ matrix.without_gui }}-${{ matrix.build_sdist }}-${{ matrix.platform }}
         path: wheelhouse/opencv*
 
   Test:
     needs: [Build]
     runs-on: windows-2025
     defaults:
       run:
         shell: cmd
     strategy:
       fail-fast: false
       matrix:
         python-version: ['3.7', '3.8', '3.9', '3.10', '3.11', '3.12', '3.13']
         platform: [x86, x64]
         with_contrib: [0, 1]
         without_gui: [0, 1]
         build_sdist: [0]
     env:
       ACTIONS_ALLOW_UNSECURE_COMMANDS: true
       OPENCV_TEST_DATA_PATH: ${{ github.workspace }}\opencv_extra\testdata
       PYLINT_TEST_FILE: ${{ github.workspace }}\opencv\samples\python\squares.py
       PlatformToolset: v143
     steps:
     - name: Cleanup
       shell: bash
       run: |
         rm -rf ./* || true
         rm -rf ./.??* || true
       working-directory: ${{ github.workspace }}
     - name: Checkout
       uses: actions/checkout@v4
       with:
         submodules: true
         fetch-depth: 0
     - name: Set up Python ${{ matrix.python-version }}
       uses: actions/setup-python@v4
       with:
         python-version: ${{ matrix.python-version }}
         architecture: ${{ matrix.platform }}
     - name: Download a wheel accordingly to matrix
       uses: actions/download-artifact@v4
       with:
         name: wheel-${{ matrix.with_contrib }}-${{ matrix.without_gui }}-${{ matrix.build_sdist }}-${{ matrix.platform }}
         path: wheelhouse/
     - name: Package installation
       run: |
         cd ${{ github.workspace }}/tests
         &python -m pip install --user --no-warn-script-location (ls "../wheelhouse/opencv*.whl")
         if ($LastExitCode -ne 0) {throw $LastExitCode}
         python get_build_info.py
       shell: powershell
     - name: Run tests
       run: |
         cd ${{ github.workspace }}/opencv
         python modules\python\test\test.py -v --repo .
     - name: Pylint test
       run: |
         python -m pip install pylint==2.15.9
         cd ${{ github.workspace }}\tests
         python -m pylint $PYLINT_TEST_FILE
